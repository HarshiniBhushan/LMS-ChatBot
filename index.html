<!DOCTYPE html>
<html>
<head>
    <title>College Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="chat-container">

    <div class="chat-header">
        <h2>College Assistant</h2>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="bot-message">
            Welcome! Ask your question or choose below.
        </div>
    </div>

    <div class="faq-buttons">
        <button onclick="sendFAQ('Check attendance')">Check Attendance</button>
        <button onclick="sendFAQ('Exam details')">Exam Details</button>
        <button onclick="sendFAQ('Timetable')">Timetable</button>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your question..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
